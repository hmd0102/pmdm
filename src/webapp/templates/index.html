<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Malware Detector</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      border-radius: 15px;
      padding: 25px;
      width: 400px;
      background: #111827;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .btn-custom {
      width: 100%;
      border-radius: 10px;
    }

    .result-box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
    }

    .benign {
      background: rgba(34,197,94,0.2);
      color: #22c55e;
    }

    .malicious {
      background: rgba(239,68,68,0.2);
      color: #ef4444;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h3 class="text-center mb-3 text-white">📄 PDF Malware Detector</h3>

  <form method="post" enctype="multipart/form-data">
    <input class="form-control mb-3" type="file" name="file" required>

    <button class="btn btn-primary btn-custom" type="submit">
      🔍 Analyze
    </button>
  </form>

  <div class="loading" id="loading">
    ⏳ Đang phân tích...
  </div>

  <!-- Error -->
  {% if error %}
    <div class="alert alert-danger mt-3">
      {{ error }}
    </div>
  {% endif %}

  <!-- Result -->
  {% if result %}
    <div class="result-box mt-3 
      {% if result.label == 'Malicious' %}malicious{% else %}benign{% endif %}">

      <h5>Kết quả: 
        {% if result.label == 'Malicious' %}
          ⚠️ Malicious
        {% else %}
          ✅ Benign
        {% endif %}
      </h5>

      <p>Benign: {{ result.prob_benign }}</p>
      <p>Malicious: {{ result.prob_malicious }}</p>
    </div>
  {% endif %}

</div>

<script>
  const form = document.querySelector("form");
  form.addEventListener("submit", () => {
    document.getElementById("loading").style.display = "block";
  });
</script>

</body>
</html>
