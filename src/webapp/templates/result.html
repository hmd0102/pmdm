<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prediction Result</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #111827;
      border-radius: 15px;
      padding: 25px;
      width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .malicious {
      color: #ef4444;
    }

    .benign {
      color: #22c55e;
    }

    .progress {
      height: 20px;
      border-radius: 10px;
      overflow: hidden;
      background: #374151;
    }

    .progress-bar {
      font-size: 12px;
    }

    a.btn {
      margin-top: 15px;
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="card text-center">
  <h4 class="mb-3 text-white">📄 Kết quả phân tích</h4>

  <p class="text-white"><strong>File:</strong> {{ filename }}</p>

  <!-- Prediction -->
  <h5 class="
    {% if prediction == 'Malicious' %}
      malicious
    {% else %}
      benign
    {% endif %}
  ">
    {% if prediction == 'Malicious' %}
      ⚠️ Malicious
    {% else %}
      ✅ Benign
    {% endif %}
  </h5>

  <!-- Probability -->
  {% if probability %}
    <div class="mt-3">

      <p class="mb-1 text-white">Benign</p>
      <div class="progress mb-2">
        <div class="progress-bar bg-success"
             style="width: {{ probability[0]*100 }}%">
          {{ (probability[0]*100) | round(2) }}%
        </div>
      </div>

      <p class="mb-1 text-white">Malicious</p>
      <div class="progress">
        <div class="progress-bar bg-danger"
             style="width: {{ probability[1]*100 }}%">
          {{ (probability[1]*100) | round(2) }}%
        </div>
      </div>

    </div>
  {% endif %}

  <!-- Button -->
  <a href="{{ url_for('upload_file') }}" class="btn btn-primary">
    ⬅ Upload file khác
  </a>
</div>

</body>
</html>
